<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Delivery App</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #2c3e50;
            font-weight: 700;
        }

        .login-header .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }

        .login-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin: 0.5rem 0 0 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 0.7rem;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
            color: #bdc3c7;
            font-size: 0.9rem;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #ecf0f1;
        }

        .divider span {
            position: relative;
            background: #fff;
            padding: 0 1rem;
        }

        .register-section {
            text-align: center;
        }

        .register-text {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .register-btn {
            width: 100%;
            padding: 0.75rem;
            background: #ecf0f1;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        .register-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .features {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid #ecf0f1;
            text-align: center;
        }

        .features h3 {
            color: #2c3e50;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin: 0 0 1rem 0;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        .feature-item {
            padding: 0.5rem;
        }

        .feature-item::before {
            content: '✓';
            color: #667eea;
            font-weight: bold;
            margin-right: 0.3rem;
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 15px;
                padding: 1.5rem;
            }

            .login-header h1 {
                font-size: 2rem;
            }

            .feature-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="app.js" defer></script>
</head>

<body>
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    <header>
        <h1 style="margin: 0; color: white; font-size: 1.2rem;">🍽️ Food Delivery App</h1>
    </header>

    <div class="login-container">
        <div class="login-header">
            <span class="emoji">🔐</span>
            <h1>Login</h1>
            <p>Welcome back! Sign in to your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Email or Username</label>
                <input type="text" id="username" required placeholder="Enter your email or username" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="divider">
            <span>New to FoodHub?</span>
        </div>

        <div class="register-section">
            <p class="register-text">Create a new account to start ordering</p>
            <button type="button" class="register-btn" onclick="window.location.href='register.html'">Create Account</button>
        </div>

        <div class="features">
            <h3>Why Choose Us?</h3>
            <div class="feature-list">
                <div class="feature-item">Fast Delivery</div>
                <div class="feature-item">Fresh Food</div>
                <div class="feature-item">Best Prices</div>
                <div class="feature-item">24/7 Support</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            await login(username, password);
        });
    </script>
</body>

</html>
