<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body style="background: var(--tracking-map-bg);">
    <div id="toast-container"></div>

    <a href="orders.html" class="back-btn">← Back</a>

    <div class="tracking-container">
        <!-- Static Map Simulation -->
        <div class="map-overlay">
            <svg width="600" height="800"
                style="position: absolute; top: 0; left: 0; transform: translate(-50%, -50%); pointer-events: none;">
                <!-- Path from Restaurant to User -->
                <path class="tracking-path" d="M 180 240 Q 300 350 360 480" />
            </svg>
        </div>

        <div class="track-marker marker-rest">🏪</div>
        <div class="track-marker marker-user">🏠</div>
        <div class="track-marker marker-delivery">🛵</div>

        <!-- Detail Card -->
        <div class="tracking-card">
            <div style="display: flex; justify-content: center; margin-bottom: 1rem;">
                <div style="width: 40px; height: 4px; background: #ddd; border-radius: 2px;"></div>
            </div>

            <div class="tracking-info-row">
                <h2 style="margin: 0; border: none; font-size: 1.2rem; color: #333;">Tracking Details</h2>
                <div id="status-badge"
                    style="background: #2ecc71; color: white; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">
                    ON WAY
                </div>
            </div>

            <div style="border-bottom: 1px solid #f0f0f0; padding-bottom: 1rem; margin-bottom: 1rem;">
                <p id="order-id" style="color: #7f8c8d; font-size: 0.8rem; margin-bottom: 0.5rem;">Order #...</p>
                <h3 id="item-summary" style="margin: 0; font-size: 1rem; color: #333;">Loading items...</h3>
                <p id="order-total" style="color: #555; margin-top: 0.2rem;">$0.00</p>
            </div>

            <div class="tracking-info-row">
                <div>
                    <p style="margin: 0; font-weight: 600; font-size: 0.9rem;">Passcode</p>
                    <p style="margin: 0.2rem 0 0; color: #7f8c8d; font-size: 0.8rem;">3994</p>
                </div>
                <div>
                    <p style="margin: 0; font-weight: 600; font-size: 0.9rem;">Estimated Time</p>
                    <p style="margin: 0.2rem 0 0; color: #7f8c8d; font-size: 0.8rem;">25 mins</p>
                </div>
            </div>

            <div class="tracking-info-row" style="margin-top: 1.5rem;">
                <div style="display: flex; align-items: center;">
                    <div
                        style="width: 40px; height: 40px; background: #eee; border-radius: 50%; margin-right: 1rem; background-image: url('https://randomuser.me/api/portraits/men/32.jpg'); background-size: cover;">
                    </div>
                    <div>
                        <p style="margin: 0; font-weight: 600;">David Morgan</p>
                        <p style="margin: 0; font-size: 0.8rem; color: #7f8c8d;">Delivery Partner</p>
                    </div>
                </div>
                <!-- Call Button FAB -->
                <button class="call-btn" onclick="alert('Calling Delivery Partner...')">📞</button>
            </div>

            <button class="btn"
                style="width: 100%; margin-top: 1rem; border-radius: 25px; background: #333; font-size: 0.8rem;"
                onclick="window.location.href='orders.html'">Done</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            checkAuth();
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');

            if (!orderId) {
                window.location.href = 'orders.html';
                return;
            }

            document.getElementById('order-id').textText = `Order #${orderId}`;

            try {
                // Fetch specific order details. 
                // Currently app.js fetchOrders() gets ALL orders. We can use that and filter.
                const orders = await fetchOrders();
                const order = orders.find(o => o.id == orderId);

                if (order) {
                    document.getElementById('order-id').innerText = `Order #${order.id} • ${new Date(order.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
                    document.getElementById('order-total').innerText = `$${order.total_price.toFixed(2)}`;
                    document.getElementById('status-badge').innerText = order.status.replace('_', ' ');

                    // Fetch restaurant to get menu items to show names... or just count
                    // Since order.items usually has menu_item_id, we need names.
                    // Ideally backend would join this. For frontend demo:
                    const menu = await fetchMenu(order.restaurant_id);
                    const itemNames = order.items.map(i => {
                        const m = menu.find(x => x.id === i.menu_item_id);
                        return m ? `${i.quantity} x ${m.name}` : `${i.quantity} x Item`;
                    }).join(', ');

                    document.getElementById('item-summary').innerText = itemNames;
                }
            } catch (e) {
                console.error(e);
            }
        });
    </script>
</body>

</html>
